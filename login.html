<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie — System parkingowy</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="topbar">
        <div class="logo"><a href="index.html" style="color:#fff;text-decoration:none;">System parkingowy</a></div>
    </header>

    <main class="login-wrapper">
        <div class="login-card">
            <h1>Logowanie</h1>

            <label for="login">Login</label>
            <input type="text" id="login" placeholder="Wpisz login">

            <label for="haslo">Hasło</label>
            <input type="password" id="haslo" placeholder="Wpisz hasło">

            <button id="przyciskLogowania">Zaloguj się</button>

            <p id="komunikat" class="komunikat"></p>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>

</html>
